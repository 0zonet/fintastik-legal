<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fintastik — Documentos Legales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #060A12;
      --bg-surface: #0E1320;
      --text-heading: #F0F0F5;
      --text-body: #D0D0D8;
      --text-muted: #909098;
      --primary: #00D4FF;
      --border: rgba(255,255,255,0.07);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-base); color: var(--text-body); line-height: 1.8; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 420px; width: 100%; padding: 40px 24px; text-align: center; }
    .brand { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 32px; }
    .brand-dot { width: 12px; height: 12px; border-radius: 3px; background: var(--primary); }
    .brand-name { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-heading); letter-spacing: -0.3px; }
    .tagline { font-size: 13px; color: var(--text-muted); margin-bottom: 40px; }
    h1 { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 600; color: var(--text-heading); margin-bottom: 24px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .links a {
      display: block; padding: 16px 20px; border-radius: 12px;
      background: var(--bg-surface); border: 0.5px solid var(--border);
      color: var(--text-heading); text-decoration: none; font-size: 15px; font-weight: 500;
      transition: border-color 0.2s, background 0.2s;
    }
    .links a:hover { border-color: var(--primary); background: rgba(0,212,255,0.05); }
    .links a span { display: block; font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 400; }
    .footer { margin-top: 48px; font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">Fintastik</span>
    </div>
    <p class="tagline">Gastos claros, buenas decisiones</p>

    <h1>Documentos Legales</h1>

    <div class="links">
      <a href="privacy.html">
        Política de Privacidad
        <span>Cómo protegemos y usamos tus datos</span>
      </a>
      <a href="terms.html">
        Términos de Uso
        <span>Condiciones del servicio Fintastik</span>
      </a>
    </div>

    <div class="footer">
      <p>© 2026 Fintastik. Todos los derechos reservados.</p>
      <p style="margin-top: 6px;"><a href="mailto:contacto@fintastik.cl" style="color: var(--primary); text-decoration: none;">contacto@fintastik.cl</a></p>
    </div>
  </div>
</body>
</html>
